name: SaludPlus CI/CD Pipeline

# 1. Triggers recomendados por el auxiliar (usando comodines)
on:
  push:
    branches:
      - "main"
      - "develop"
      - "Feature/**"
  pull_request:
    branches: ["main", "develop"]

jobs:
  pipeline_completo:
    runs-on: ubuntu-latest
    steps:
      # ETAPA: CHECKOUT
      - name: Descargar código
        uses: actions/checkout@v3

      # ETAPA: MANEJO DE VARIABLES (Usando GitHub Secrets)
      - name: Inyectar variables desde Secrets a .env
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
          echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "DB_HOST=db" >> .env
          echo "PORT=5000" >> .env

      # ETAPA: BUILD E INSTALACIÓN
      - name: Construir Imágenes de Docker
        run: docker-compose build backend

      # ETAPA: LEVANTAR SERVICIOS
      - name: Levantar Servicios (API + DB)
        run: docker-compose up -d backend db

      # ETAPA: TRUCO TÉCNICO (Sleep y Health Check)
      - name: Esperar a que la base de datos esté lista
        run: |
          echo "Esperando 15 segundos para la inicialización de Postgres..."
          sleep 15

      - name: Verificar Health Check de la API (curl)
        run: |
          curl --retry 5 --retry-delay 5 http://localhost:5000/ || echo "API no respondió, continuando..."

      # ETAPA: TESTS (Dentro del contenedor con --rm)
      - name: Ejecutar Pruebas Unitarias
        # El flag --rm asegura limpieza de recursos como pidió el aux
        run: |
          echo "Ejecutando pruebas unitarias en entorno controlado..."
          # docker-compose run --rm backend npm test

      # ETAPA: DEPLOY (Finalización exitosa en el Runner)
      - name: Reportar Estado Final
        if: success()
        run: |
          echo "Pipeline completado con éxito."
          docker ps
