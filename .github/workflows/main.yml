name: Deploy SaludPlus to Droplet

on:
  push:
    branches:
      - "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Desplegar a DigitalOcean vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            # Crear directorio si no existe
            mkdir -p /home/saludplus/app
            cd /home/saludplus/app
            
            # Limpiar repositorio viejo (si existe) y clonar la rama main
            # Nota: Recomendable usar deploy keys o tokens si tu repo es privado
            git pull origin main || git clone https://github.com/MarceJua/AYD1-Fase1S2026_SeccionB_G2.git .
            git checkout main
            git pull origin main

            # Crear el archivo .env con las variables de GitHub Secrets
            echo "DB_USER=${{ secrets.DB_USER }}" > .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
            echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

            # Bajar contenedores viejos y levantar los nuevos
            docker compose down
            docker compose up --build -d
